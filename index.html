<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E60 Drift - Direksiyon Modu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        /* Dik Ekran (Telefon Boyutu) */
        #gameContainer {
            position: relative;
            width: 360px;
            height: 640px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            border: 2px solid #333;
        }
        canvas {
            display: block;
            background: #1a1a1a;
        }
        #musicInfo {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            border-left: 3px solid #ff0055;
            pointer-events: none;
        }
        #startOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            z-index: 10;
        }
        h2 { margin-bottom: 5px; color: #fff; }
        p { color: #888; font-size: 13px; margin-bottom: 20px; padding: 0 20px;}
        .btn {
            background: #ff0055;
            color: white;
            padding: 10px 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="musicInfo">
        🔊 Çalan: ТГК - Гелик (2014)<br>
        <span style="color: #888;">[YouTube Embed]</span>
    </div>
    <div id="startOverlay" onclick="startGame()">
        <h2>E60 DRIFT</h2>
        <p>Ekranın en altındaki direksiyonu tutup sağa sola çevirerek yanla!</p>
        <button class="btn">OYNA & MÜZİĞİ AÇ</button>
    </div>
    <div id="video-container" style="position:absolute; width:0; height:0; opacity:0; pointer-events:none;"></div>
    <canvas id="gameCanvas" width="360" height="640"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameStarted = false;
let isInteracting = false;

// Yol ve Hız
let roadOffset = 0;
let speed = 8;
let score = 0;

// E60 Başlangıç Ayarları
const e60 = {
    x: 180,
    y: 340,
    width: 45,
    height: 85,
    angle: 0,
    smoke: []
};

// EKRANIN EN ALTINDAKİ DİREKSİYON AYARLARI
const steeringWheel = {
    x: 180,        // Yatayda tam ortada
    y: 540,        // Telefonun en altında
    radius: 55,    // Direksiyon büyüklüğü
    angle: 0,      // Anlık dönme açısı (radyan)
    maxAngle: 2.5  // Maksimum dönebilme sınırı
};

function startGame() {
    document.getElementById('startOverlay').style.display = 'none';
    gameStarted = true;
    const container = document.getElementById('video-container');
    container.innerHTML = `<iframe width="100" height="100" src="https://www.youtube.com/embed/l8mBWe4KxDo?autoplay=1&loop=1&playlist=l8mBWe4KxDo" allow="autoplay"></iframe>`;
}

// Dokunma ve Fare Olayları
function getMouseAngle(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = clientX - rect.left;
    const mouseY = clientY - rect.top;
    return Math.atan2(mouseY - steeringWheel.y, mouseX - steeringWheel.x);
}

function startControl(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.clientX || e.touches[0].clientX;
    const clientY = e.clientY || e.touches[0].clientY;
    const mouseX = clientX - rect.left;
    const mouseY = clientY - rect.top;
    
    const dist = Math.hypot(mouseX - steeringWheel.x, mouseY - steeringWheel.y);
    if (dist < steeringWheel.radius + 30) {
        isInteracting = true;
    }
}

function moveControl(e) {
    if (!isInteracting) return;
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    if (!clientX || !clientY) return;

    let currentAngle = getMouseAngle(clientX, clientY);
    let adjustedAngle = currentAngle + Math.PI / 2;

    if (adjustedAngle > Math.PI) adjustedAngle -= Math.PI * 2;
    if (adjustedAngle < -Math.PI) adjustedAngle += Math.PI * 2;

    if (adjustedAngle < -steeringWheel.maxAngle) adjustedAngle = -steeringWheel.maxAngle;
    if (adjustedAngle > steeringWheel.maxAngle) adjustedAngle = steeringWheel.maxAngle;

    steeringWheel.angle = adjustedAngle;
}

function endControl() {
    isInteracting = false;
}

// Event Listeners
canvas.addEventListener('mousedown', startControl);
window.addEventListener('mousemove', moveControl);
window.addEventListener('mouseup', endControl);

canvas.addEventListener('touchstart', startControl);
window.addEventListener('touchmove', moveControl);
window.addEventListener('touchend', endControl);

// Duman Parçacıkları
function createSmoke(x, y) {
    if (Math.abs(e60.angle) > 0.04) {
        e60.smoke.push({
            x: x, y: y,
            size: Math.random() * 6 + 4,
            alpha: 0.5
        });
    }
}

// OYUN DÖNGÜSÜ
function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Yol Çizimi (Asfalt ve Şeritler)
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#222'; ctx.fillRect(30, 0, 300, canvas.height);

    roadOffset += speed;
    if (roadOffset > 40) roadOffset = 0;

    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 4;
    ctx.setLineDash([20, 20]);
    ctx.beginPath();
    ctx.moveTo(110, 0); ctx.lineTo(110, canvas.height);
    ctx.moveTo(250, 0); ctx.lineTo(250, canvas.height);
    ctx.stroke();

    // Akan Sarı Şerit
    ctx.strokeStyle = 'rgba(255, 255, 0, 0.3)';
    ctx.beginPath();
    ctx.lineDashOffset = -roadOffset;
    ctx.moveTo(180, 0); ctx.lineTo(180, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    if (gameStarted) {
        if (!isInteracting) {
            steeringWheel.angle *= 0.85;
        }

        // 2. Direksiyon Hareketi
        e60.x += steeringWheel.angle * 4.5;

        if (e60.x < 55) e60.x = 55;
        if (e60.x > 305) e60.x = 305;

        let targetCarAngle = steeringWheel.angle * 0.25;
        e60.angle += (targetCarAngle - e60.angle) * 0.15;

        if (Math.abs(e60.angle) > 0.05) {
            score += Math.floor(Math.abs(e60.angle) * 15);
            createSmoke(e60.x - 12, e60.y + 35);
            createSmoke(e60.x + 12, e60.y + 35);
        }
    }

    // 3. Dumanlar
    for (let i = e60.smoke.length - 1; i >= 0; i--) {
        let p = e60.smoke[i];
        p.y += speed * 0.6;
        p.alpha -= 0.025;
        if (p.alpha <= 0) { e60.smoke.splice(i, 1); continue; }
        ctx.fillStyle = `rgba(180, 180, 180, ${p.alpha})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }

    // 4. BASİT 2D SİYAH E60 ÇİZİMİ
    ctx.save();
    ctx.translate(e60.x, e60.y);
    ctx.rotate(e60.angle);

    ctx.fillStyle = '#0d0d0d';
    ctx.fillRect(-e60.width/2, -e60.height/2, e60.width, e60.height);
    ctx.strokeStyle = '#252525'; ctx.lineWidth = 2;
    ctx.strokeRect(-e60.width/2, -e60.height/2, e60.width, e60.height);

    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(-e60.width/2 + 4, -18, e60.width - 8, 14);
    ctx.fillRect(-e60.width/2 + 4, 22, e60.width - 8, 12);

    ctx.fillStyle = '#ffffe0';
    ctx.fillRect(-e60.width/2 + 3, -e60.height/2, 7, 3);
    ctx.fillRect(e60.width/2 - 10, -e60.height/2, 7, 3);

    ctx.fillStyle = '#cc0022';
    ctx.fillRect(-e60.width/2 + 2, e60.height/2 - 3, 9, 3);
    ctx.fillRect(e60.width/2 - 11, e60.height/2 - 3, 9, 3);

    ctx.restore();

    // 5. DİREKSİYON ÇİZİMİ
    ctx.save();
    ctx.translate(steeringWheel.x, steeringWheel.y);
    ctx.rotate(steeringWheel.angle);

    ctx.strokeStyle = '#444';
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.arc(0, 0, steeringWheel.radius, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2; ctx.stroke();

    ctx.strokeStyle = '#444';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(16, 0); ctx.lineTo(steeringWheel.radius - 4, 0);
    ctx.moveTo(-16, 0); ctx.lineTo(-steeringWheel.radius + 4, 0);
    ctx.moveTo(0, 16); ctx.lineTo(0, steeringWheel.radius - 4);
    ctx.stroke();

    ctx.restore();

    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, 460); ctx.lineTo(360, 460); ctx.stroke();

    // 6. Skor
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 15px Courier New';
    ctx.fillText(`DRIFT SCORE: ${score}`, 35, 95);

    requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
