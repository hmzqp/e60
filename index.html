<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E60 Drift - Trafik ve Skor Modu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 360px;
            height: 640px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            border: 2px solid #333;
        }
        canvas {
            display: block;
            background: #1a1a1a;
        }
        #musicInfo {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            border-left: 3px solid #ff0055;
            pointer-events: none;
            z-index: 5;
        }
        #startOverlay, #gameOverOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }
        #gameOverOverlay { display: none; }
        h2 { margin-bottom: 5px; color: #fff; letter-spacing: 2px; }
        p { color: #888; font-size: 12px; margin-bottom: 15px; padding: 0 25px;}
        input {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 15px;
            width: 60%;
            border-radius: 3px;
        }
        input:focus { border-color: #ff0055; outline: none; }
        .btn {
            background: #ff0055;
            color: white;
            padding: 12px 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            font-family: monospace;
            box-shadow: 0 4px 10px rgba(255, 0, 85, 0.3);
        }
        .btn:hover { background: #e0004c; }
        .leaderboard {
            margin-top: 20px;
            width: 70%;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #333;
        }
        .leaderboard h3 { margin: 0 0 8px 0; font-size: 14px; color: #ff0055; }
        .score-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin: 4px 0;
            color: #ccc;
        }
        .top1 { color: #ffca28; font-weight: bold; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="musicInfo">
        🔊 Müzik: Teçhizat Üretimi<br>
        <span style="color: #ff0055;">[Sistem Sesi Aktif]</span>
    </div>

    <!-- GİRİŞ EKRANI -->
    <div id="startOverlay">
        <h2>E60 DRIFT</h2>
        <p>Aşağıdaki direksiyonu çevirerek şerit değiştirmeden yanla ve trafiğe çarpmamaya çalış!</p>
        <input type="text" id="playerName" placeholder="PİLOT ADI GİR" maxlength="10">
        <button class="btn" onclick="setupGame()">OYNA & SESİ AÇ</button>
        
        <div class="leaderboard">
            <h3>🏆 EN YÜKSEK SKORLAR (TOP 3)</h3>
            <div id="topScoresMenu"></div>
        </div>
    </div>

    <!-- OYUN BİTTİ EKRANI -->
    <div id="gameOverOverlay">
        <h2 style="color: #ff0055;">KAZA YAPILDI!</h2>
        <p id="finalScoreTxt">Skorun: 0</p>
        
        <button class="btn" onclick="restartGame()">TEKRAR DENE</button>

        <div class="leaderboard">
            <h3>🏆 EN YÜKSEK SKORLAR (TOP 3)</h3>
            <div id="topScoresGameOver"></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="360" height="640"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameStarted = false;
let isInteracting = false;
let currentPlayerName = "Anonim";

// Yol ve Hız Kontrolleri
let roadOffset = 0;
let speed = 7;
let score = 0;

// E60 Ayarları
const e60 = {
    x: 180,
    y: 440, // Direksiyonun biraz üzerinde durması için yukarı çektim
    width: 42,
    height: 82,
    angle: 0,
    smoke: []
};

// Trafik Arabaları
let traffic = [];
let spawnTimer = 0;
const lanes = [70, 180, 290]; // Sol, Orta, Sağ Şerit Merkezleri
const trafficColors = ['#cc0022', '#0066cc', '#009944', '#e6a100', '#730099'];

// Direksiyon Ayarları
const steeringWheel = {
    x: 180,
    y: 565,
    radius: 45,
    angle: 0,
    maxAngle: 2.2
};

// DİNAMİK MÜZİK SİSTEMİ (Web Audio API)
// Tarayıcının dış kaynakları engellemesini engellemek için kendi ritmini kendi üreten ses motoru.
let audioCtx = null;
let musicInterval = null;
let beatIndex = 0;
// Bas drift melodisi notaları
const synthNotes = [110, 110, 130, 110, 146, 110, 130, 164]; 

function startSynthMusic() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    musicInterval = setInterval(() => {
        if (!gameStarted) return;
        
        // Bas Sesi Üretici (Her vuruşta tetiklenir)
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        
        osc.type = 'sawtooth';
        // Hıza göre ritmin frekansını hafifçe büküyoruz ucuz bir drift hissi için
        osc.frequency.setValueAtTime(synthNotes[beatIndex % synthNotes.length], audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.22);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.25);

        // Hi-Hat / Davul Tıslaması Ekleme
        if (beatIndex % 2 === 0) {
            let noise = audioCtx.createOscillator();
            let noiseGain = audioCtx.createGain();
            noise.type = 'triangle';
            noise.frequency.setValueAtTime(10000, audioCtx.currentTime);
            noiseGain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            noise.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start();
            noise.stop(audioCtx.currentTime + 0.06);
        }

        beatIndex++;
    }, 150); // Ritim hızı
}

// Oyunu ve Liderlik Tablosunu Yükleme Odası
function updateLeaderboardUI() {
    let scores = JSON.parse(localStorage.getItem('e60_leaderboard')) || [];
    // Eksik yerleri doldur
    while(scores.length < 3) {
        scores.push({name: "---", score: 0});
    }
    
    let html = "";
    scores.forEach((s, index) => {
        let crown = index === 0 && s.score > 0 ? "👑 " : `${index + 1}. `;
        let rowClass = index === 0 && s.score > 0 ? "score-row top1" : "score-row";
        html += `<div class="${rowClass}"><span>${crown}${s.name}</span><span>${s.score} Puan</span></div>`;
    });
    
    document.getElementById('topScoresMenu').innerHTML = html;
    document.getElementById('topScoresGameOver').innerHTML = html;
}

function saveScore(name, finalScore) {
    if(finalScore <= 0) return;
    let scores = JSON.parse(localStorage.getItem('e60_leaderboard')) || [];
    scores.push({name: name, score: finalScore});
    // Büyükten küçüğe sırala
    scores.sort((a, b) => b.score - a.score);
    // Sadece ilk 3'ü tut
    scores = scores.slice(0, 3);
    localStorage.setItem('e60_leaderboard', JSON.stringify(scores));
    updateLeaderboardUI();
}

function setupGame() {
    const inputName = document.getElementById('playerName').value.trim();
    if(inputName !== "") {
        currentPlayerName = inputName;
    }
    document.getElementById('startOverlay').style.display = 'none';
    gameStarted = true;
    startSynthMusic();
}

function restartGame() {
    document.getElementById('gameOverOverlay').style.display = 'none';
    score = 0;
    speed = 7;
    traffic = [];
    e60.x = 180;
    e60.angle = 0;
    gameStarted = true;
}

// Girişte Tabloyu Yükle
updateLeaderboardUI();

// Giriş ve Kontrol Mekanizması
function getMouseAngle(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = clientX - rect.left;
    const mouseY = clientY - rect.top;
    return Math.atan2(mouseY - steeringWheel.y, mouseX - steeringWheel.x);
}

function startControl(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    if (!clientX || !clientY) return;

    const mouseX = clientX - rect.left;
    const mouseY = clientY - rect.top;
    
    const dist = Math.hypot(mouseX - steeringWheel.x, mouseY - steeringWheel.y);
    if (dist < steeringWheel.radius + 40) {
        isInteracting = true;
    }
}

function moveControl(e) {
    if (!isInteracting) return;
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    if (!clientX || !clientY) return;

    let currentAngle = getMouseAngle(clientX, clientY);
    let adjustedAngle = currentAngle + Math.PI / 2;

    if (adjustedAngle > Math.PI) adjustedAngle -= Math.PI * 2;
    if (adjustedAngle < -Math.PI) adjustedAngle += Math.PI * 2;

    if (adjustedAngle < -steeringWheel.maxAngle) adjustedAngle = -steeringWheel.maxAngle;
    if (adjustedAngle > steeringWheel.maxAngle) adjustedAngle = steeringWheel.maxAngle;

    steeringWheel.angle = adjustedAngle;
}

function endControl() { isInteracting = false; }

canvas.addEventListener('mousedown', startControl);
window.addEventListener('mousemove', moveControl);
window.addEventListener('mouseup', endControl);
canvas.addEventListener('touchstart', startControl, { passive: true });
window.addEventListener('touchmove', moveControl, { passive: true });
window.addEventListener('touchend', endControl);

function createSmoke(x, y) {
    if (Math.abs(e60.angle) > 0.04) {
        e60.smoke.push({ x: x, y: y, size: Math.random() * 5 + 3, alpha: 0.4 });
    }
}

// OYUN MOTORU DÖNGÜSÜ
function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Asfalt Tablo Çizimi
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#222'; ctx.fillRect(20, 0, 320, canvas.height); // Yol genişletildi

    roadOffset += speed;
    if (roadOffset > 40) roadOffset = 0;

    // Şerit Çizgileri
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 4;
    ctx.setLineDash([20, 20]);
    ctx.beginPath();
    ctx.moveTo(125, 0); ctx.lineTo(125, canvas.height);
    ctx.moveTo(235, 0); ctx.lineTo(235, canvas.height);
    ctx.stroke();

    // Emniyet Şeritleri (Sarı)
    ctx.strokeStyle = 'rgba(255, 200, 0, 0.2)';
    ctx.beginPath();
    ctx.lineDashOffset = -roadOffset;
    ctx.moveTo(25, 0); ctx.lineTo(25, canvas.height);
    ctx.moveTo(335, 0); ctx.lineTo(335, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    if (gameStarted) {
        if (!isInteracting) {
            steeringWheel.angle *= 0.82; // Direksiyon toplama yumuşaklığı
        }

        // Araba Hareketi
        e60.x += steeringWheel.angle * 4.8;

        // Yol dışı koruması
        if (e60.x < 45) e60.x = 45;
        if (e60.x > 315) e60.x = 315;

        let targetCarAngle = steeringWheel.angle * 0.28;
        e60.angle += (targetCarAngle - e60.angle) * 0.2;

        // Yanlama Skoru Hesaplama
        if (Math.abs(e60.angle) > 0.05) {
            score += Math.floor(Math.abs(e60.angle) * 8);
            createSmoke(e60.x - 10, e60.y + 35);
            createSmoke(e60.x + 10, e60.y + 35);
        }

        // Hızı zamanla hafifçe artır
        speed = 7 + Math.min(score / 800, 8);

        // TRAFİK ÜRETİMİ (Yapay Zeka Araçları)
        spawnTimer++;
        if (spawnTimer > Math.max(45 - (speed * 1.5), 22)) {
            spawnTimer = 0;
            let randomLane = lanes[Math.floor(Math.random() * lanes.length)];
            
            // Üst üste binme kontrolü
            if (traffic.length === 0 || Math.abs(traffic[traffic.length - 1].y) > 130) {
                traffic.push({
                    x: randomLane,
                    y: -100,
                    width: 38,
                    height: 75,
                    speed: 2 + Math.random() * 2,
                    color: trafficColors[Math.floor(Math.random() * trafficColors.length)]
                });
            }
        }
    }

    // Duman Efektleri Çizimi
    for (let i = e60.smoke.length - 1; i >= 0; i--) {
        let p = e60.smoke[i];
        p.y += speed * 0.7;
        p.alpha -= 0.02;
        if (p.alpha <= 0) { e60.smoke.splice(i, 1); continue; }
        ctx.fillStyle = `rgba(160, 160, 160, ${p.alpha})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }

    // TRAFİK ARAÇLARINI GÜNCELLE VE ÇİZ
    for (let i = traffic.length - 1; i >= 0; i--) {
        let t = traffic[i];
        if (gameStarted) {
            t.y += speed - t.speed; // Oyuncu hızına göre aşağı akarlar
        }

        // Ekrandan çıkan arabaları temizle
        if (t.y > canvas.height + 100) {
            traffic.splice(i, 1);
            score += 50; // Başarıyla geçilen her araç için bonus puan
            continue;
        }

        // Trafik arabası tasarımı
        ctx.fillStyle = t.color;
        ctx.fillRect(t.x - t.width / 2, t.y - t.height / 2, t.width, t.height);
        // Camlar ve Farlar
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(t.x - t.width / 2 + 3, t.y - 10, t.width - 6, 12);
        ctx.fillStyle = '#ff0';
        ctx.fillRect(t.x - t.width / 2 + 2, t.y + t.height / 2 - 4, 6, 4);
        ctx.fillRect(t.x + t.width / 2 - 8, t.y + t.height / 2 - 4, 6, 4);

        // KAZA KONTROLÜ (AABB Çarpışma Algoritması)
        if (gameStarted) {
            let hitX = Math.abs(e60.x - t.x) < (e60.width / 2 + t.width / 2 - 4);
            let hitY = Math.abs(e60.y - t.y) < (e60.height / 2 + t.height / 2 - 4);
            
            if (hitX && hitY) {
                // GAME OVER TETİKLENDİ
                gameStarted = false;
                saveScore(currentPlayerName, score);
                document.getElementById('finalScoreTxt').innerText = `${currentPlayerName}, Toplam Skorun: ${score}`;
                document.getElementById('gameOverOverlay').style.display = 'flex';
            }
        }
    }

    // KENDİ ARACIMIZ (E60 CANAVARI)
    ctx.save();
    ctx.translate(e60.x, e60.y);
    ctx.rotate(e60.angle);

    // Gövde
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(-e60.width/2, -e60.height/2, e60.width, e60.height);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.strokeRect(-e60.width/2, -e60.height/2, e60.width, e60.height);

    // Ön-Arka Camlar
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(-e60.width/2 + 4, -16, e60.width - 8, 12);
    ctx.fillRect(-e60.width/2 + 4, 20, e60.width - 8, 10);

    // Angel Farlar
    ctx.fillStyle = '#ffea00';
    ctx.fillRect(-e60.width/2 + 3, -e60.height/2, 6, 3);
    ctx.fillRect(e60.width/2 - 9, -e60.height/2, 6, 3);

    // Stop Lambaları
    ctx.fillStyle = '#ff0033';
    ctx.fillRect(-e60.width/2 + 2, e60.height/2 - 3, 8, 3);
    ctx.fillRect(e60.width/2 - 10, e60.height/2 - 3, 8, 3);

    ctx.restore();

    // KONTROL PANELİ VE DİREKSİYON SİMİDİ
    ctx.save();
    ctx.translate(steeringWheel.x, steeringWheel.y);
    ctx.rotate(steeringWheel.angle);

    // Direksiyon Çemberi
    ctx.strokeStyle = '#2d2d2d'; ctx.lineWidth = 9;
    ctx.beginPath(); ctx.arc(0, 0, steeringWheel.radius, 0, Math.PI * 2); ctx.stroke();

    // Merkez Göbek
    ctx.fillStyle = '#151515';
    ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#444'; ctx.lineWidth = 2; ctx.stroke();

    // Direksiyon Kolları
    ctx.strokeStyle = '#2d2d2d'; ctx.lineWidth = 7;
    ctx.beginPath();
    ctx.moveTo(14, 0); ctx.lineTo(steeringWheel.radius - 3, 0);
    ctx.moveTo(-14, 0); ctx.lineTo(-steeringWheel.radius + 3, 0);
    ctx.moveTo(0, 14); ctx.lineTo(0, steeringWheel.radius - 3);
    ctx.stroke();

    ctx.restore();

    // Arayüz Çizgisi ve Skor Göstergesi
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, 500); ctx.lineTo(360, 500); ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px Courier New';
    ctx.fillText(`SKOR: ${score}`, 30, 95);
    ctx.fillStyle = '#ff0055';
    ctx.fillText(`PİLOT: ${currentPlayerName.toUpperCase()}`, 30, 75);

    requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
