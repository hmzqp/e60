<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E60 M5 Drift - Real Music Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 360px;
            height: 640px;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.2);
            border: 2px solid #222;
            background: #151515;
        }
        canvas {
            display: block;
        }
        #musicInfo {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.85);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            border-left: 3px solid #0052b4;
            pointer-events: none;
            z-index: 5;
            line-height: 1.4;
        }
        #startOverlay, #gameOverOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.96);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }
        #gameOverOverlay { display: none; }
        h2 { margin-bottom: 5px; color: #fff; letter-spacing: 3px; font-weight: 900; }
        p { color: #aaa; font-size: 12px; margin-bottom: 15px; padding: 0 30px;}
        input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 15px;
            width: 65%;
            border-radius: 4px;
        }
        input:focus { border-color: #0052b4; outline: none; }
        .btn {
            background: #0052b4;
            color: white;
            padding: 12px 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-family: monospace;
            box-shadow: 0 4px 15px rgba(0, 82, 180, 0.4);
            letter-spacing: 1px;
        }
        .btn:hover { background: #003e8a; }
        .leaderboard {
            margin-top: 25px;
            width: 75%;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #222;
        }
        .leaderboard h3 { margin: 0 0 10px 0; font-size: 13px; color: #ff0055; letter-spacing: 1px; }
        .score-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin: 5px 0;
            color: #bbb;
        }
        .top1 { color: #ffca28; font-weight: bold; }
        
        /* Audio Player Gizleme */
        #gameAudio {
            display: none;
        }
    </style>
</head>
<body>

<!-- AUDIO ELEMENT - Using a free public audio source -->
<audio id="gameAudio" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<div id="gameContainer">
    <div id="musicInfo">
        🎵 Music: Streaming...<br>
        <span style="color: #00ff66;">[Now Playing]</span>
    </div>

    <div id="startOverlay">
        <h2 style="color: #0052b4;">BMW E60 M5</h2>
        <p>Efsane kasa ile makas atarak yanla! Trafikteki arabalara çarpmamaya çalış.</p>
        <input type="text" id="playerName" placeholder="PİLOT ADINI YAZ" maxlength="10">
        <button class="btn" onclick="setupGame()">GAZLA & SESİ AÇ</button>
        
        <div class="leaderboard">
            <h3>🏆 GLOBAL LİDERLER (TOP 3)</h3>
            <div id="topScoresMenu"><div style="color: #666; font-size: 12px;">Yükleniyor...</div></div>
        </div>
    </div>

    <div id="gameOverOverlay">
        <h2 style="color: #ff0033;">PERT OLDUN LAOO!</h2>
        <p id="finalScoreTxt">Skorun: 0</p>
        <button class="btn" style="background: #ff0033; box-shadow: 0 4px 15px rgba(255,0,51,0.3);" onclick="restartGame()">TEKRAR DENE</button>

        <div class="leaderboard">
            <h3>🏆 GLOBAL LİDERLER (TOP 3)</h3>
            <div id="topScoresGameOver"><div style="color: #666; font-size: 12px;">Yükleniyor...</div></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="360" height="640"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const gameAudio = document.getElementById('gameAudio');

let gameStarted = false;
let isInteracting = false;
let currentPlayerName = "Anonim";

let roadOffset = 0;
let speed = 7;
let score = 0;

const e60 = {
    x: 180,
    y: 450,
    width: 44,
    height: 88,
    angle: 0,
    smoke: []
};

let traffic = [];
let spawnTimer = 0;
const lanes = [70, 180, 290];
const trafficColors = ['#cc0022', '#333333', '#444444', '#e6a100', '#007f5f'];

const steeringWheel = {
    x: 180,
    y: 570,
    radius: 42,
    angle: 0,
    maxAngle: 2.2
};

const LEADERBOARD_URL = 'https://raw.githubusercontent.com/hmzqp/e60/main/leaderboard.json';

async function fetchGlobalLeaderboard() {
    try {
        const response = await fetch(LEADERBOARD_URL);
        const data = await response.json();
        return data.scores || [];
    } catch (e) {
        console.log('Leaderboard fetch error:', e);
        return [];
    }
}

async function updateLeaderboardUI() {
    let globalScores = await fetchGlobalLeaderboard();
    let localScores = JSON.parse(localStorage.getItem('e60_leaderboard_v6')) || [];
    
    // Merge and sort
    let allScores = [...globalScores, ...localScores];
    allScores.sort((a, b) => b.score - a.score);
    allScores = allScores.slice(0, 3);
    
    while(allScores.length < 3) { allScores.push({name: "---", score: 0}); }
    
    let html = "";
    allScores.forEach((s, index) => {
        let prefix = index === 0 && s.score > 0 ? "👑 " : `${index + 1}. `;
        let rowClass = index === 0 && s.score > 0 ? "score-row top1" : "score-row";
        html += `<div class="${rowClass}"><span>${prefix}${s.name}</span><span>${s.score} Puan</span></div>`;
    });
    
    document.getElementById('topScoresMenu').innerHTML = html;
    document.getElementById('topScoresGameOver').innerHTML = html;
}

function saveScore(name, finalScore) {
    if(finalScore <= 0) return;
    let scores = JSON.parse(localStorage.getItem('e60_leaderboard_v6')) || [];
    scores.push({name: name, score: finalScore});
    scores.sort((a, b) => b.score - a.score);
    scores = scores.slice(0, 10);
    localStorage.setItem('e60_leaderboard_v6', JSON.stringify(scores));
    updateLeaderboardUI();
}

function setupGame() {
    const inputName = document.getElementById('playerName').value.trim();
    if(inputName !== "") currentPlayerName = inputName;
    document.getElementById('startOverlay').style.display = 'none';
    gameStarted = true;
    
    // Play audio
    if (gameAudio) {
        gameAudio.play().catch(e => console.log('Audio play error:', e));
    }
}

function restartGame() {
    document.getElementById('gameOverOverlay').style.display = 'none';
    score = 0; speed = 7; traffic = [];
    e60.x = 180; e60.angle = 0;
    gameStarted = true;
    
    // Resume audio
    if (gameAudio) {
        gameAudio.play().catch(e => console.log('Audio play error:', e));
    }
}

updateLeaderboardUI();

function getMouseAngle(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return Math.atan2(clientY - rect.top - steeringWheel.y, clientX - rect.left - steeringWheel.x);
}

function startControl(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    if (!clientX || !clientY) return;

    const mX = clientX - rect.left;
    const mY = clientY - rect.top;
    if (Math.hypot(mX - steeringWheel.x, mY - steeringWheel.y) < steeringWheel.radius + 40) {
        isInteracting = true;
    }
}

function moveControl(e) {
    if (!isInteracting) return;
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    if (!clientX || !clientY) return;

    let adjustedAngle = getMouseAngle(clientX, clientY) + Math.PI / 2;
    if (adjustedAngle > Math.PI) adjustedAngle -= Math.PI * 2;
    if (adjustedAngle < -Math.PI) adjustedAngle += Math.PI * 2;

    steeringWheel.angle = Math.max(-steeringWheel.maxAngle, Math.min(steeringWheel.maxAngle, adjustedAngle));
}

canvas.addEventListener('mousedown', startControl);
window.addEventListener('mousemove', moveControl);
window.addEventListener('mouseup', () => isInteracting = false);
canvas.addEventListener('touchstart', startControl, { passive: true });
window.addEventListener('touchmove', moveControl, { passive: true });
window.addEventListener('touchend', () => isInteracting = false);

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#1c1c1c'; ctx.fillRect(20, 0, 320, canvas.height); 

    roadOffset += speed;
    if (roadOffset > 40) roadOffset = 0;

    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 4; ctx.setLineDash([25, 25]);
    ctx.beginPath();
    ctx.moveTo(125, 0); ctx.lineTo(125, canvas.height);
    ctx.moveTo(235, 0); ctx.lineTo(235, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    if (gameStarted) {
        if (!isInteracting) steeringWheel.angle *= 0.84;
        e60.x += steeringWheel.angle * 4.8;

        if (e60.x < 45) e60.x = 45;
        if (e60.x > 315) e60.x = 315;

        let targetAngle = steeringWheel.angle * 0.28;
        e60.angle += (targetAngle - e60.angle) * 0.2;

        if (Math.abs(e60.angle) > 0.05) {
            score += Math.floor(Math.abs(e60.angle) * 8);
            if(Math.random() > 0.3) {
                e60.smoke.push({ x: e60.x - 12, y: e60.y + 38, size: Math.random()*5+3, alpha: 0.4 });
                e60.smoke.push({ x: e60.x + 12, y: e60.y + 38, size: Math.random()*5+3, alpha: 0.4 });
            }
        }
        speed = 7 + Math.min(score / 900, 8);

        spawnTimer++;
        if (spawnTimer > Math.max(45 - (speed * 1.4), 20)) {
            spawnTimer = 0;
            let targetLane = lanes[Math.floor(Math.random() * lanes.length)];
            if (traffic.length === 0 || Math.abs(traffic[traffic.length - 1].y) > 140) {
                traffic.push({
                    x: targetLane, y: -100, width: 40, height: 78,
                    speed: 1.5 + Math.random() * 2,
                    color: trafficColors[Math.floor(Math.random() * trafficColors.length)]
                });
            }
        }
    }

    for (let i = e60.smoke.length - 1; i >= 0; i--) {
        let p = e60.smoke[i]; p.y += speed * 0.7; p.alpha -= 0.025;
        if (p.alpha <= 0) { e60.smoke.splice(i, 1); continue; }
        ctx.fillStyle = `rgba(140, 140, 140, ${p.alpha})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }

    for (let i = traffic.length - 1; i >= 0; i--) {
        let t = traffic[i];
        if (gameStarted) t.y += speed - t.speed;

        if (t.y > canvas.height + 100) { traffic.splice(i, 1); score += 50; continue; }

        ctx.fillStyle = t.color;
        ctx.fillRect(t.x - t.width/2, t.y - t.height/2, t.width, t.height);
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(t.x - t.width/2 + 3, t.y - 12, t.width - 6, 12);

        if (gameStarted) {
            if (Math.abs(e60.x - t.x) < 38 && Math.abs(e60.y - t.y) < 80) {
                gameStarted = false;
                gameAudio.pause();
                saveScore(currentPlayerName, score);
                document.getElementById('finalScoreTxt').innerText = `${currentPlayerName}, Toplam Skorun: ${score}`;
                document.getElementById('gameOverOverlay').style.display = 'flex';
            }
        }
    }

    // BMW E60 M5 CANVAS ÇİZİMİ
    ctx.save();
    ctx.translate(e60.x, e60.y);
    ctx.rotate(e60.angle);

    ctx.fillStyle = '#1c1f22'; 
    ctx.beginPath();
    ctx.moveTo(-e60.width/2 + 4, -e60.height/2); 
    ctx.lineTo(e60.width/2 - 4, -e60.height/2);  
    ctx.quadraticCurveTo(e60.width/2, -e60.height/2 + 10, e60.width/2, -e60.height/4); 
    ctx.lineTo(e60.width/2, e60.height/4); 
    ctx.quadraticCurveTo(e60.width/2, e60.height/2, e60.width/2 - 3, e60.height/2); 
    ctx.lineTo(-e60.width/2 + 3, e60.height/2); 
    ctx.quadraticCurveTo(-e60.width/2, e60.height/2, -e60.width/2, e60.height/4);
    ctx.lineTo(-e60.width/2, -e60.height/4);
    ctx.quadraticCurveTo(-e60.width/2, -e60.height/2 + 10, -e60.width/2 + 4, -e60.height/2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#3a3f44'; ctx.lineWidth = 1.5; ctx.stroke();

    ctx.fillStyle = '#050505';
    ctx.fillRect(-8, -e60.height/2, 3.5, 3);
    ctx.fillRect(4, -e60.height/2, 3.5, 3);
    ctx.strokeStyle = '#777'; ctx.lineWidth = 0.5;
    ctx.strokeRect(-8, -e60.height/2, 3.5, 3);
    ctx.strokeRect(4, -e60.height/2, 3.5, 3);

    ctx.fillStyle = '#fffb00'; 
    ctx.beginPath();
    ctx.moveTo(-e60.width/2 + 2, -e60.height/2 + 1);
    ctx.lineTo(-e60.width/2 + 11, -e60.height/2 + 3);
    ctx.lineTo(-e60.width/2 + 8, -e60.height/2 + 7);
    ctx.closePath(); ctx.fill();
    
    ctx.beginPath();
    ctx.moveTo(e60.width/2 - 2, -e60.height/2 + 1);
    ctx.lineTo(e60.width/2 - 11, -e60.height/2 + 3);
    ctx.lineTo(e60.width/2 - 8, -e60.height/2 + 7);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = 'rgba(15, 20, 25, 0.85)'; 
    ctx.beginPath();
    ctx.moveTo(-e60.width/2 + 5, -15);
    ctx.quadraticCurveTo(0, -19, e60.width/2 - 5, -15);
    ctx.lineTo(e60.width/2 - 5, -4);
    ctx.lineTo(-e60.width/2 + 5, -4);
    ctx.closePath(); ctx.fill();
    
    ctx.beginPath();
    ctx.moveTo(-e60.width/2 + 5, 18);
    ctx.lineTo(e60.width/2 - 5, 18);
    ctx.quadraticCurveTo(0, 25, e60.width/2 - 5, 28);
    ctx.lineTo(-e60.width/2 + 5, 28);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#1c1f22';
    ctx.fillRect(-e60.width/2 - 4, -12, 4, 3);
    ctx.fillRect(e60.width/2, -12, 4, 3);

    ctx.fillStyle = '#cc0011';
    ctx.fillRect(-e60.width/2 + 2, e60.height/2 - 5, 9, 4); 
    ctx.fillRect(e60.width/2 - 11, e60.height/2 - 5, 9, 4); 

    ctx.fillStyle = '#888';
    ctx.fillRect(-e60.width/4 - 3, e60.height/2, 2, 3);
    ctx.fillRect(-e60.width/4, e60.height/2, 2, 3);
    ctx.fillRect(e60.width/4, e60.height/2, 2, 3);
    ctx.fillRect(e60.width/4 + 3, e60.height/2, 2, 3);

    ctx.restore();

    ctx.save(); ctx.translate(steeringWheel.x, steeringWheel.y); ctx.rotate(steeringWheel.angle);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.arc(0, 0, steeringWheel.radius, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#222'; ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(13, 0); ctx.lineTo(steeringWheel.radius - 2, 0);
    ctx.moveTo(-13, 0); ctx.lineTo(-steeringWheel.radius + 2, 0);
    ctx.moveTo(0, 13); ctx.lineTo(0, steeringWheel.radius - 2);
    ctx.stroke();
    ctx.restore();

    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Courier New';
    ctx.fillText(`SKOR: ${score}`, 30, 95);
    ctx.fillStyle = '#0052b4'; ctx.fillText(`PİLOT: ${currentPlayerName.toUpperCase()}`, 30, 75);

    requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
